<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منظم المهام اليومي</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .date-display {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
            backdrop-filter: blur(10px);
        }

        .task-input-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #taskInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #taskInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #addTaskBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #addTaskBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #addTaskBtn:active {
            transform: translateY(0);
        }

        .priority-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            background: white;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        .tasks-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tasks-header h2 {
            color: #333;
            font-size: 1.5em;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s;
            border-right: 4px solid #667eea;
        }

        .task-item.priority-high {
            border-right-color: #e74c3c;
        }

        .task-item.priority-medium {
            border-right-color: #f39c12;
        }

        .task-item.priority-low {
            border-right-color: #27ae60;
        }

        .task-item.completed {
            opacity: 0.6;
            background: #e8f5e9;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #888;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            margin-left: 15px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }

        .task-priority {
            font-size: 12px;
            color: #888;
            background: #e0e0e0;
            padding: 3px 8px;
            border-radius: 10px;
            display: inline-block;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-btn {
            background: #3498db;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }

        .floating-add-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .floating-add-btn:hover {
            transform: scale(1.1);
        }

        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }

            .stats-container {
                grid-template-columns: 1fr;
            }

            .tasks-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .floating-add-btn {
                display: flex;
            }

            #addTaskBtn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📋 منظم المهام</h1>
            <div class="date-display" id="currentDate"></div>
        </header>

        <div class="task-input-container">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="أضف مهمة جديدة..." maxlength="100">
                <button id="addTaskBtn">إضافة</button>
            </div>
            <select id="prioritySelect" class="priority-select">
                <option value="low">🟢 أولوية منخفضة</option>
                <option value="medium" selected>🟡 أولوية متوسطة</option>
                <option value="high">🔴 أولوية عالية</option>
            </select>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">المجموع</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">مكتملة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label">قيد الانتظار</div>
            </div>
        </div>

        <div class="tasks-container">
            <div class="tasks-header">
                <h2>المهام</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">الكل</button>
                    <button class="filter-btn" data-filter="pending">قيد الانتظار</button>
                    <button class="filter-btn" data-filter="completed">مكتملة</button>
                </div>
            </div>
            <ul class="task-list" id="taskList">
                <!-- Tasks will be added here -->
            </ul>
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">📝</div>
                <p>لا توجد مهام بعد.<br>ابدأ بإضافة مهمة جديدة!</p>
            </div>
        </div>
    </div>

    <button class="floating-add-btn" id="floatingAddBtn">+</button>

    <script>
        // Task Manager App
        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.currentFilter = 'all';
                this.init();
            }

            init() {
                this.bindEvents();
                this.updateDate();
                this.renderTasks();
                this.updateStats();
            }

            loadTasks() {
                const saved = localStorage.getItem('dailyTasks');
                return saved ? JSON.parse(saved) : [];
            }

            saveTasks() {
                localStorage.setItem('dailyTasks', JSON.stringify(this.tasks));
            }

            bindEvents() {
                document.getElementById('addTaskBtn').addEventListener('click', () => this.addTask());
                document.getElementById('floatingAddBtn').addEventListener('click', () => {
                    document.getElementById('taskInput').focus();
                });

                document.getElementById('taskInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.addTask();
                });

                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.dataset.filter;
                        this.renderTasks();
                    });
                });

                document.getElementById('taskList').addEventListener('click', (e) => {
                    const taskItem = e.target.closest('.task-item');
                    if (!taskItem) return;

                    const taskId = parseInt(taskItem.dataset.id);

                    if (e.target.classList.contains('task-checkbox')) {
                        this.toggleTask(taskId);
                    } else if (e.target.closest('.edit-btn')) {
                        this.editTask(taskId);
                    } else if (e.target.closest('.delete-btn')) {
                        this.deleteTask(taskId);
                    }
                });
            }

            updateDate() {
                const now = new Date();
                const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('currentDate').textContent = now.toLocaleDateString('ar-EG', options);
            }

            addTask() {
                const input = document.getElementById('taskInput');
                const priority = document.getElementById('prioritySelect').value;
                const text = input.value.trim();

                if (!text) {
                    alert('الرجاء إدخال نص المهمة');
                    return;
                }

                const task = {
                    id: Date.now(),
                    text: text,
                    priority: priority,
                    completed: false,
                    createdAt: new Date().toISOString()
                };

                this.tasks.unshift(task);
                this.saveTasks();
                this.renderTasks();
                this.updateStats();

                input.value = '';
                input.focus();
            }

            toggleTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                }
            }

            editTask(id) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    const newText = prompt('تعديل المهمة:', task.text);
                    if (newText && newText.trim()) {
                        task.text = newText.trim();
                        this.saveTasks();
                        this.renderTasks();
                    }
                }
            }

            deleteTask(id) {
                if (confirm('هل أنت متأكد من حذف هذه المهمة؟')) {
                    this.tasks = this.tasks.filter(t => t.id !== id);
                    this.saveTasks();
                    this.renderTasks();
                    this.updateStats();
                }
            }

            getFilteredTasks() {
                switch (this.currentFilter) {
                    case 'pending':
                        return this.tasks.filter(t => !t.completed);
                    case 'completed':
                        return this.tasks.filter(t => t.completed);
                    default:
                        return this.tasks;
                }
            }

            renderTasks() {
                const taskList = document.getElementById('taskList');
                const emptyState = document.getElementById('emptyState');
                const filteredTasks = this.getFilteredTasks();

                if (filteredTasks.length === 0) {
                    taskList.style.display = 'none';
                    emptyState.style.display = 'block';
                    return;
                }

                taskList.style.display = 'block';
                emptyState.style.display = 'none';

                taskList.innerHTML = filteredTasks.map(task => `
                    <li class="task-item priority-${task.priority} ${task.completed ? 'completed' : ''}" data-id="${task.id}">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                        <div class="task-content">
                            <div class="task-text">${this.escapeHtml(task.text)}</div>
                            <span class="task-priority">${this.getPriorityLabel(task.priority)}</span>
                        </div>
                        <div class="task-actions">
                            <button class="action-btn edit-btn" title="تعديل">✏️</button>
                            <button class="action-btn delete-btn" title="حذف">🗑️</button>
                        </div>
                    </li>
                `).join('');
            }

            updateStats() {
                const total = this.tasks.length;
                const completed = this.tasks.filter(t => t.completed).length;
                const pending = total - completed;

                document.getElementById('totalTasks').textContent = total;
                document.getElementById('completedTasks').textContent = completed;
                document.getElementById('pendingTasks').textContent = pending;
            }

            getPriorityLabel(priority) {
                const labels = {
                    'high': 'عالية',
                    'medium': 'متوسطة',
                    'low': 'منخفضة'
                };
                return labels[priority] || priority;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Initialize the app
        document.addEventListener('DOMContentLoaded', () => {
            new TaskManager();
        });

        // Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('SW registered:', registration);
                }).catch(error => {
                    console.log('SW registration failed:', error);
                });
            });
        }
    </script>
</body>
</html>
